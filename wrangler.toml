name = "portfolio-tracker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# ---- Static frontend (served by the same Worker) ----
[assets]
directory = "./public"
binding = "ASSETS"

# ---- R2 bucket: stores ALL data (portfolios, transactions, price cache) ----
[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "portfolio-tracker-data"

# ---- Price refresh, twice daily ----
# 45 09 UTC = 16:45 Bangkok, shortly after SET market close (~16:30 Bangkok) - keeps Thai
#   stocks/funds fresh the same evening instead of waiting until the next run.
# 30 22 UTC = 05:30 Bangkok, after US markets close (~21:00-22:00 UTC) - keeps US/global
#   stocks fresh, and doubles as a pre-market-open refresh for Thai holdings.
[triggers]
crons = ["45 9 * * *", "30 22 * * *"]

# ---- Secrets (set with `wrangler secret put <NAME>`) ----
# APP_PASSWORD -> single shared password protecting the app
# SEC_API_KEY  -> optional, only needed if you track Thai mutual funds (SEC Open Data API subscription key)

[vars]
BASE_CURRENCY = "THB"
